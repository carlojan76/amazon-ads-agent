name: Deploy UI to GitHub Pages

# Ricostruisce e pubblica la React app su GitHub Pages.
# Si attiva da solo quando cambia il codice dell'app o quando il workflow
# "Weekly Amazon Ads Analysis" pubblica dati nuovi in public/data/.
#
# ATTENZIONE: GitHub Pages è pubblico di default (anche se il repo è privato,
# a meno di GitHub Enterprise Cloud con visibilità Pages ristretta). Chiunque
# conosca l'URL del sito può vedere i dati di spesa/keyword pubblicati qui.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "vite.config.js"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
