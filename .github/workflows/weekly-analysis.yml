name: Weekly Amazon Ads Analysis

on:
  schedule:
    # Ogni lunedì alle 07:00 UTC (08:00 ora italiana in inverno, 09:00 in estate)
    - cron: '0 7 * * 1'
  workflow_dispatch:
    # Permette di lanciarlo manualmente dal tab Actions
    inputs:
      marketplaces:
        description: 'Marketplaces da analizzare (es. IT,FR,DE)'
        required: false
        default: 'IT,FR,DE'
      days:
        description: 'Giorni da analizzare'
        required: false
        default: '14'

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 🚀 Run weekly analysis
        env:
          # Amazon Advertising API credentials
          AMAZON_ADS_CLIENT_ID: ${{ secrets.AMAZON_ADS_CLIENT_ID }}
          AMAZON_ADS_CLIENT_SECRET: ${{ secrets.AMAZON_ADS_CLIENT_SECRET }}
          AMAZON_ADS_REFRESH_TOKEN: ${{ secrets.AMAZON_ADS_REFRESH_TOKEN }}

          # Anthropic API
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # Email (Gmail SMTP)
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: 587
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

          # Parametri (override manuale se eseguito on-demand)
          MARKETPLACES: ${{ github.event.inputs.marketplaces || 'IT,FR,DE' }}
          ANALYSIS_DAYS: ${{ github.event.inputs.days || '14' }}
        run: |
          cd python
          python -u weekly_analysis.py

      - name: 📦 Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: weekly-reports-${{ github.run_number }}
          path: python/reports/
          retention-days: 30

      - name: 🌐 Pubblica dati per la UI online (GitHub Pages)
        if: always()
        run: |
          mkdir -p public/data
          if [ -d python/reports/latest ]; then
            cp python/reports/latest/*.json public/data/ 2>/dev/null || true
          fi
          if [ -z "$(ls -A public/data 2>/dev/null)" ]; then
            echo "Nessun dato da pubblicare (nessun marketplace elaborato con successo)."
            exit 0
          fi
          git config user.name "amazon-ads-bot"
          git config user.email "actions@github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "Nessuna modifica ai dati pubblicati, skip commit."
          else
            git commit -m "chore: aggiorna dati campagne per la UI online"
            git push
          fi
